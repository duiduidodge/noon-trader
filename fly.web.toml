app = "noon-trader-web"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.web"

[env]
  NODE_ENV = "production"
  PORT = "3012"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3012
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1024mb"
